      subject: "Makefile: Sync build tags with engine"
      body: This change excludes the devmapper module.
    - hash: 610b2b81378e087908904d40c98259ae8712d8a0
      author: Alex Gonzalez
      footers:
        change-type: minor
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      subject: Downgrade module dependencies
      body: >-
        Currently mobynit is using packages from moby v19.03.12. This hits a
        crash

        when using it to HUP on x86_64 devices (see balena-os/meta-balena#2589).

        The crash comes as a result of ignoring the following warning at
        compilation

        time:

        cgo_lookup_unix.go:28: warning: Using 'getpwuid_r' in statically linked
        applications requires at runtime the shared libraries from the glibc
        version used for linking

        And it is possibly related to the following unsolved glibc issue with

        static linking: https://sourceware.org/bugzilla/show_bug.cgi?id=19341

        The starting point of the crash is introduced in moby's commit hash:

        fa8dd90ceb7bcb9d554d27e0b9087ab83e54bd2b, in v19.03.1.

        This commit downgrades the moby libraries to before that commit was

        introduced (v19.03.0), avoiding the crash.

        Fixes balena-os/meta-balena#2589
