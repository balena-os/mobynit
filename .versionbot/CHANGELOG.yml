- version: 0.1.0
  date: 2021-04-21T16:20:57Z
  commits:
    - hash: 044961425fb0d4f1e44e8ea62c9fa0174a7d0dac
      author: Alex Gonzalez
      footers:
        change-type: patch
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      subject: "mobynit: Refer to overlay images instead of host extensions"
      body: |-
        Further discussions in the context of a multi container hostOS has
        changed the terminology. What was referred to as host extensions are now
        overlay images that go into the data store.
        This commit changes the terminology used with variables and functions
        renames without functional changes.
    - hash: 47f7436458eee138e9447c603ea863d1e216c137
      author: Alex Gonzalez
      footers:
        relates-to: balena-io/pull/2376
        change-type: minor
        changelog-entry: Use image overlay labels
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      subject: "mobyinit: Use the new image labels instead of a feature label"
      body: >-
        In the context of the multi container hostOS architecture, the different

        images that form the hostOS have been labeled, and what used to be
        referred

        to as host extensions are now overlay images defined with the following

        image label:

        io.balena.image.class: overlay

        This commit modifies mobyinit to match for images with that label.
